<ion-content>
  <div class="background">
    <div class="card">

      <!-- Logo -->
      <div class="avatar-container">
        <div class="logo-icon">
          <img src="assets/icon/favicon1.png" width="72" height="72" />
        </div>
        <h1 class="app-name">SmartTask</h1>
        <p class="app-subtitle">organiza, prioriza y cumple</p>
      </div>

      <h2 class="title">Inicio de sesión</h2>

      <!-- Usuario -->
      <ion-item lines="none" class="input-item">
        <ion-icon name="person-outline" slot="start" class="input-icon"></ion-icon>
        <ion-input
          [(ngModel)]="username"
          type="text"
          placeholder="Usuario"
          clearInput="true"
          (keyup.enter)="onLogin()">
        </ion-input>
      </ion-item>

      <!-- Contraseña -->
      <ion-item lines="none" class="input-item">
        <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
        <ion-input
          [(ngModel)]="password"
          type="password"
          placeholder="Contraseña"
          clearInput="true"
          (keyup.enter)="onLogin()">
        </ion-input>
      </ion-item>

      <!-- Botón entrar -->
      <ion-button
        expand="block"
        class="login-btn"
        (click)="onLogin()"
        [disabled]="isLoading">
        <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
        <span *ngIf="!isLoading">Entrar</span>
        <span *ngIf="isLoading">Ingresando...</span>
      </ion-button>

      <!-- Botón registro -->
      <ion-button
        expand="block"
        fill="outline"
        class="register-btn"
        (click)="goToRegister()"
        [disabled]="isLoading">
        Crear cuenta
      </ion-button>

    </div>
  </div>
</ion-content>
