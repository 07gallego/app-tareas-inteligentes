<ion-content>

  <div class="login-wrapper">

    <!-- Logo -->
    <div class="logo-container">
      <div class="logo-icon">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <rect x="8" y="10" width="18" height="3" rx="1.5" fill="white" opacity="0.4"/>
          <rect x="8" y="18" width="24" height="3" rx="1.5" fill="white" opacity="0.4"/>
          <rect x="8" y="26" width="14" height="3" rx="1.5" fill="white" opacity="0.4"/>
          <circle cx="5" cy="11.5" r="2.5" fill="white" opacity="0.4"/>
          <circle cx="5" cy="19.5" r="2.5" fill="white" opacity="0.4"/>
          <circle cx="5" cy="27.5" r="2.5" fill="white" opacity="0.4"/>
          <circle cx="34" cy="30" r="8" fill="#7F77DD"/>
          <path d="M30 30 L33 33 L39 26" fill="none" stroke="white"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>TaskApp</h1>
      <p>organiza tu día</p>
    </div>

    <!-- Formulario -->
    <div class="form-container">
      <h2>Iniciar sesión</h2>

      <div class="input-group">
        <label>Usuario</label>
        <ion-input
          [(ngModel)]="username"
          type="text"
          placeholder="Ingresa tu usuario">
        </ion-input>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <ion-input
          [(ngModel)]="password"
          type="password"
          placeholder="Ingresa tu contraseña">
        </ion-input>
      </div>

      <ion-button expand="block" (click)="onLogin()">
        Entrar
      </ion-button>

    </div>

  </div>

</ion-content>
